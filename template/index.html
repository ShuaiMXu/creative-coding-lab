<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Creative Coding Lab — 每期模板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>window.p5||document.write('<script src="../vendor/p5.min.js"><\/script>')</script>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:"Noto Serif SC",serif;background:#20201d;color:#e8e2d4;}
  #app{display:flex;min-height:100vh;}
  #stage{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;}
  #stage canvas{box-shadow:0 24px 60px rgba(0,0,0,.55);max-width:100%;max-height:100%;}
  #panel{width:280px;flex:none;background:#26251f;border-left:1px solid #3a382f;padding:22px 20px;}
  h1{font-size:18px;margin:0 0 16px;letter-spacing:2px;}
  .grp{margin-bottom:16px;}
  .grp label{display:flex;justify-content:space-between;font-size:12px;color:#c7c0ad;margin-bottom:6px;}
  .grp label .v{color:#c9975a;}
  input[type=range]{width:100%;accent-color:#c9975a;}
  .seed{display:flex;gap:6px;margin-bottom:8px;}
  .seed input{flex:1;background:#1b1a15;border:1px solid #3a382f;color:#e8e2d4;padding:6px;border-radius:4px;}
  button{background:#33322a;border:1px solid #46443a;color:#e8e2d4;padding:7px 10px;border-radius:5px;cursor:pointer;font-family:inherit;}
  button:hover{background:#413f34;}
  button.primary{background:#8a5a2b;border-color:#a06a33;color:#fff;}
  .row{display:flex;gap:6px;} .row button{flex:1;}
</style>
</head>
<body>
<div id="app">
  <div id="stage"></div>
  <div id="panel">
    <h1>◷ 模板 Template</h1>
    <div class="grp">
      <label>Seed</label>
      <div class="seed">
        <button onclick="stepSeed(-1)">‹</button>
        <input type="number" id="seedInput" value="1" onchange="jumpSeed(this.value)">
        <button onclick="stepSeed(1)">›</button>
      </div>
      <div class="row"><button onclick="randomSeed_()">🎲 随机</button></div>
    </div>
    <!-- 在这里为你的算法添加参数滑块 ↓ -->
    <div class="grp">
      <label>示例参数 A<span class="v" id="v-a">50</span></label>
      <input type="range" id="p-a" min="0" max="100" value="50" oninput="setP('a',this.value)">
    </div>
    <div class="grp">
      <div class="row">
        <button class="primary" onclick="regen()">↻ 重新生成</button>
        <button onclick="savePNG()">⤓ 存图</button>
      </div>
    </div>
  </div>
</div>
<script src="sketch.js"></script>
</body>
</html>
